################ MCP Client 相關設定（Windows 專用）################
# 所有 MCP server stdio 連線設定集中於此，不再依賴外部 JSON 設定檔。
# spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers-windows.json
# Client 等待 MCP Server 回應的最大時間（包含 elicitation 期間使用者輸入的等待時間，需與 server-side 300s 對齊）
spring.ai.mcp.client.request-timeout=300s
# ── Filesystem MCP Server ──────────────────────────────────────────
# 使用 @modelcontextprotocol/server-filesystem（Node.js package）讓 LLM 能讀寫本機檔案。
# Windows 需透過 cmd /c 包裝 npx 指令才能正確執行（macOS 可直接呼叫 npx）。
# 根目錄優先使用環境變數 MCP_FILESYSTEM_ROOT，未設定則 fallback 到 %USERPROFILE%\Desktop\mymcp。
# 覆寫方式：
#   PowerShell:           $env:MCP_FILESYSTEM_ROOT="C:\path\to\dir"
#   IntelliJ Run Config:  MCP_FILESYSTEM_ROOT=C:\path\to\dir
spring.ai.mcp.client.stdio.connections.filesystem.command=cmd
spring.ai.mcp.client.stdio.connections.filesystem.args[0]=/c
spring.ai.mcp.client.stdio.connections.filesystem.args[1]=npx
spring.ai.mcp.client.stdio.connections.filesystem.args[2]=-y
spring.ai.mcp.client.stdio.connections.filesystem.args[3]=@modelcontextprotocol/server-filesystem
spring.ai.mcp.client.stdio.connections.filesystem.args[4]=${MCP_FILESYSTEM_ROOT:${user.home}/Desktop/mymcp}
# ── GitHub MCP Server ──────────────────────────────────────────────
# 使用官方 GitHub MCP Server Docker image，讓 LLM 能操作 GitHub repositories。
# 需預先在環境中設定 GITHUB_PERSONAL_ACCESS_TOKEN，Docker 啟動時透過 -e 自動帶入 container。
# -i：保持 stdin 開啟以維持 stdio 通訊；--rm：container 結束後自動移除。
spring.ai.mcp.client.stdio.connections.github.command=docker
spring.ai.mcp.client.stdio.connections.github.args[0]=run
spring.ai.mcp.client.stdio.connections.github.args[1]=-i
spring.ai.mcp.client.stdio.connections.github.args[2]=--rm
spring.ai.mcp.client.stdio.connections.github.args[3]=-e
spring.ai.mcp.client.stdio.connections.github.args[4]=GITHUB_PERSONAL_ACCESS_TOKEN
spring.ai.mcp.client.stdio.connections.github.args[5]=ghcr.io/github/github-mcp-server
# ── Helpdesk Ticket MCP Server（自製 Spring Boot stdio server）────
# 本地 Java JAR，提供 helpdesk ticket 相關工具給 LLM 呼叫。
# 注意：Spring Boot 預設將 log 輸出到 stdout，會污染 MCP JSON-RPC 通訊管道。
#      需確保 server 端已將 log 導向 stderr（例如透過 logback 設定 ConsoleAppender target=System.err）。
spring.ai.mcp.client.stdio.connections.helpdesk-ticket-mcp-server-stdio.command=java
# 延長 server 端發出 elicitation request 後等待 client 回應的 timeout（預設 20s 不夠人工輸入）。
# elicitation 需要使用者在聊天框輸入後送出，遠超過 20 秒，故設為 5 分鐘。Server 等待 Client 回應的最大時間
spring.ai.mcp.client.stdio.connections.helpdesk-ticket-mcp-server-stdio.args[0]=-Dspring.ai.mcp.server.request-timeout=300s
spring.ai.mcp.client.stdio.connections.helpdesk-ticket-mcp-server-stdio.args[1]=-jar
spring.ai.mcp.client.stdio.connections.helpdesk-ticket-mcp-server-stdio.args[2]=./mcp-server-stdio/mySpringAi_MCP_Server_stdio-0.0.1-SNAPSHOT.jar
