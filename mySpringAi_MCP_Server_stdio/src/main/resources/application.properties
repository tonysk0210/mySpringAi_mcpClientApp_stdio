# Spring Boot app 名稱
spring.application.name=mySpringAi_MCP_Server_stdio
# MCP Server 對 MCP client 宣告的 server 名稱
spring.ai.mcp.server.name=mySpringAi_MCP_Server_stdio
################ Log 相關設定 ################
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
################ H2 Database 相關設定 ################
# AUTO_SERVER=true 多個連線同時存取同一個 H2 檔案 Spring Boot app + H2 Console + DataGrip
spring.datasource.url=jdbc:h2:file:./h2db/mcpserver_stdio;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# 啟用 H2 Console
spring.h2.console.enabled=true
################ JPA/Hibernate 相關設定 ################
# Hibernate 啟動時根據 JPA Entity 嘗試更新資料表結構；通常會保留既有資料，但不適合取代正式 migration。
spring.jpa.hibernate.ddl-auto=update
################ MCP Server stdio 相關設定 ################
# 強制 Spring Boot 不要把這個 app 當成 Web application 啟動，也不要啟動 embedded Tomcat/web server。
spring.main.web-application-type=none
# 全域 log 只輸出 ERROR 等級以上，像 INFO、DEBUG、WARN 大多不會出現在 console。這可以避免 Spring Boot 啟動時的大量 log 干擾 stdio MCP protocol。
logging.level.root=error
# 關掉 Spring Boot 啟動時的 banner
spring.main.banner-mode=off



